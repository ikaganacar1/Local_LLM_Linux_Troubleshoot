<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Linux Troubleshooting Agent</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080b10;
      --panel: #111722;
      --panel-2: #151d2a;
      --panel-3: #1b2534;
      --line: #2a3548;
      --text: #edf2f7;
      --muted: #94a3b8;
      --faint: #64748b;
      --blue: #60a5fa;
      --blue-strong: #2563eb;
      --green: #34d399;
      --red: #fb7185;
      --amber: #fbbf24;
      --code: #05070b;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.32);
    }
    [data-theme="light"] {
      color-scheme: light;
      --bg: #eef2f6;
      --panel: #ffffff;
      --panel-2: #f8fafc;
      --panel-3: #eef2f7;
      --line: #d7dde6;
      --text: #111827;
      --muted: #5b687a;
      --faint: #7c899c;
      --blue: #2563eb;
      --blue-strong: #1d4ed8;
      --green: #047857;
      --red: #be123c;
      --amber: #a15c07;
      --code: #101828;
      --shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    button, input, textarea {
      font: inherit;
    }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 360px 1fr;
    }
    aside {
      border-right: 1px solid var(--line);
      background: linear-gradient(180deg, var(--panel), var(--bg));
      padding: 18px;
      overflow: auto;
    }
    main {
      min-width: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }
    .brand {
      display: grid;
      gap: 4px;
      margin-bottom: 16px;
    }
    .brand-title {
      margin: 0;
      font-size: 18px;
      font-weight: 780;
    }
    .brand-subtitle {
      color: var(--muted);
      font-size: 12px;
    }
    details.panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.02);
      margin-bottom: 10px;
      overflow: hidden;
    }
    details.panel > summary {
      list-style: none;
      cursor: pointer;
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--text);
      font-weight: 760;
      background: var(--panel-2);
      border-bottom: 1px solid transparent;
    }
    details.panel[open] > summary {
      border-bottom-color: var(--line);
    }
    details.panel > summary::-webkit-details-marker {
      display: none;
    }
    details.panel > summary::after {
      content: "+";
      color: var(--muted);
      font-weight: 800;
    }
    details.panel[open] > summary::after {
      content: "-";
    }
    .panel-body {
      padding: 12px;
      display: grid;
      gap: 10px;
    }
    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 680;
    }
    input[type="text"], textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel-3);
      color: var(--text);
      padding: 10px 11px;
      outline: none;
    }
    textarea {
      min-height: 54px;
      max-height: 180px;
      resize: vertical;
    }
    input:focus, textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.16);
    }
    .check {
      grid-template-columns: 18px 1fr;
      align-items: start;
      color: var(--text);
      font-size: 13px;
      font-weight: 650;
    }
    input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin-top: 2px;
      accent-color: var(--blue);
    }
    button {
      border: 1px solid transparent;
      border-radius: 7px;
      padding: 10px 12px;
      min-height: 40px;
      color: var(--text);
      background: var(--panel-3);
      font-weight: 750;
      cursor: pointer;
    }
    button:hover:not(:disabled) {
      border-color: var(--blue);
    }
    button:disabled {
      cursor: not-allowed;
      opacity: 0.56;
    }
    button.primary {
      background: var(--blue-strong);
      color: #fff;
    }
    button.secondary {
      background: var(--panel-3);
      border-color: var(--line);
    }
    button.danger {
      background: var(--red);
      color: #fff;
    }
    .button-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .model-list {
      display: grid;
      gap: 6px;
      max-height: 210px;
      overflow: auto;
      padding-right: 2px;
    }
    .model-item {
      text-align: left;
      border-color: var(--line);
      background: var(--panel-3);
      min-height: 36px;
      padding: 8px 10px;
      word-break: break-word;
    }
    .model-item.active {
      border-color: var(--blue);
      box-shadow: inset 3px 0 0 var(--blue);
    }
    .small-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: end;
    }
    .memory-card, .status-pill {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--muted);
      padding: 10px;
      white-space: pre-line;
      word-break: break-word;
    }
    header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(17, 23, 34, 0.86);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .top-title {
      display: grid;
      gap: 2px;
    }
    .top-title strong {
      font-size: 15px;
    }
    .top-title span {
      color: var(--muted);
      font-size: 12px;
    }
    .workspace {
      padding: 20px;
      overflow: auto;
    }
    .log {
      max-width: 1180px;
      margin: 0 auto;
      display: grid;
      gap: 12px;
    }
    .entry {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px;
      box-shadow: var(--shadow);
    }
    .entry.user { border-left: 4px solid var(--blue); }
    .entry.agent { border-left: 4px solid var(--green); }
    .entry.warn { border-left: 4px solid var(--amber); }
    .entry.blocked { border-left: 4px solid var(--red); }
    .meta {
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
    }
    .issue-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }
    .issue {
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 10px;
      background: var(--panel-2);
    }
    .issue strong {
      display: block;
      margin-bottom: 5px;
    }
    pre {
      margin: 10px 0 0;
      padding: 11px;
      border-radius: 7px;
      background: var(--code);
      color: #dbeafe;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 380px;
    }
    footer {
      border-top: 1px solid var(--line);
      background: var(--panel);
      padding: 14px 20px;
    }
    .composer {
      max-width: 1180px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
    }
    .approval-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      color: var(--muted);
      text-align: center;
      padding: 36px 14px;
      background: var(--panel);
    }
    @media (max-width: 940px) {
      .app { grid-template-columns: 1fr; }
      aside { border-right: 0; border-bottom: 1px solid var(--line); }
      .button-grid, .composer, .small-row { grid-template-columns: 1fr; }
      header { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand">
        <h1 class="brand-title">Linux Troubleshooting Agent</h1>
        <div class="brand-subtitle">Local diagnostics and maintenance</div>
      </div>

      <details class="panel" open>
        <summary>Model</summary>
        <div class="panel-body">
          <label>
            llama.cpp base URL
            <input id="baseUrl" type="text" value="http://127.0.0.1:11435/v1" spellcheck="false">
          </label>
          <div class="small-row">
            <label>
              active model
              <input id="model" type="text" value="local-model" spellcheck="false">
            </label>
            <button id="refreshModels" class="secondary" type="button">Refresh</button>
          </div>
          <div id="modelList" class="model-list">
            <button class="model-item active" type="button" data-model="local-model">local-model</button>
          </div>
        </div>
      </details>

      <details class="panel" open>
        <summary>Actions</summary>
        <div class="panel-body">
          <div class="button-grid">
            <button id="scan" class="primary" type="button">Scan System</button>
            <button id="checkUpdates" class="secondary" type="button">Check Updates</button>
            <button id="applyUpdates" class="secondary" type="button">Apply Updates</button>
            <button id="previewOrganize" class="secondary" type="button">Plan Folders</button>
            <button id="applyOrganize" class="secondary" type="button">Organize</button>
          </div>
        </div>
      </details>

      <details class="panel">
        <summary>Permissions</summary>
        <div class="panel-body">
          <label class="check"><input id="autoRunReadonly" type="checkbox"><span>Auto-run read-only scans</span></label>
          <label class="check"><input id="allowUpdates" type="checkbox"><span>Allow package updates</span></label>
          <label class="check"><input id="allowServices" type="checkbox"><span>Allow service changes</span></label>
          <label class="check"><input id="allowOrganize" type="checkbox"><span>Allow personal folder organization</span></label>
          <label class="check"><input id="requireConfirm" type="checkbox"><span>Confirm modifying actions</span></label>
          <button id="saveSettings" class="secondary" type="button">Save Permissions</button>
        </div>
      </details>

      <details class="panel">
        <summary>Appearance</summary>
        <div class="panel-body">
          <label class="check"><input id="darkMode" type="checkbox"><span>Dark mode</span></label>
        </div>
      </details>

      <details class="panel" open>
        <summary>Memory</summary>
        <div class="panel-body">
          <div id="memory" class="memory-card">Loading</div>
        </div>
      </details>
    </aside>

    <main>
      <header>
        <div class="top-title">
          <strong>System Console</strong>
          <span>Read-only scans run automatically; modifying actions remain permission-gated.</span>
        </div>
        <div id="status" class="status-pill">Ready</div>
      </header>
      <div class="workspace">
        <div id="log" class="log">
          <div class="empty">Run a scan or describe a problem.</div>
        </div>
      </div>
      <footer>
        <form id="composer" class="composer">
          <textarea id="message" placeholder="Example: HDMI monitor is not detected on KDE Wayland"></textarea>
          <button id="send" class="primary" type="submit">Send</button>
        </form>
      </footer>
    </main>
  </div>

  <script>
    const log = document.querySelector("#log");
    const form = document.querySelector("#composer");
    const message = document.querySelector("#message");
    const send = document.querySelector("#send");
    const baseUrl = document.querySelector("#baseUrl");
    const model = document.querySelector("#model");
    const modelList = document.querySelector("#modelList");
    const refreshModels = document.querySelector("#refreshModels");
    const statusBox = document.querySelector("#status");
    const memoryBox = document.querySelector("#memory");
    const darkMode = document.querySelector("#darkMode");
    const fields = {
      auto_run_readonly_scan: document.querySelector("#autoRunReadonly"),
      allow_package_updates: document.querySelector("#allowUpdates"),
      allow_service_changes: document.querySelector("#allowServices"),
      allow_personal_folder_organize: document.querySelector("#allowOrganize"),
      require_confirmation_for_modifying: document.querySelector("#requireConfirm")
    };
    let sessionId = null;
    let busy = false;

    function setBusy(value, text) {
      busy = value;
      send.disabled = value;
      for (const button of document.querySelectorAll("button")) button.disabled = value;
      statusBox.textContent = value ? (text || "Working") : "Ready";
    }

    function clearEmpty() {
      const empty = log.querySelector(".empty");
      if (empty) empty.remove();
    }

    function addEntry(kind, title, body, extra) {
      clearEmpty();
      const entry = document.createElement("div");
      entry.className = `entry ${kind}`;
      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = title;
      entry.appendChild(meta);
      if (body) {
        const text = document.createElement("div");
        text.textContent = body;
        entry.appendChild(text);
      }
      if (extra) entry.appendChild(extra);
      log.appendChild(entry);
      entry.scrollIntoView({ block: "end", behavior: "smooth" });
      return entry;
    }

    function codeBlock(text) {
      const pre = document.createElement("pre");
      pre.textContent = text || "(empty)";
      return pre;
    }

    async function get(path) {
      const response = await fetch(path);
      return response.json();
    }

    async function post(path, payload) {
      const response = await fetch(path, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      return response.json();
    }

    function basePayload(extra = {}) {
      return {
        session_id: sessionId,
        base_url: baseUrl.value.trim(),
        model: model.value.trim(),
        ...extra
      };
    }

    function applyTheme(value) {
      document.documentElement.dataset.theme = value;
      darkMode.checked = value === "dark";
      localStorage.setItem("lta-theme", value);
    }

    async function loadState() {
      const data = await get("/api/state");
      if (!data.ok) return;
      applySettings(data.settings || {});
      renderMemory(data.memory || {});
    }

    async function loadModels() {
      setBusy(true, "Loading models");
      try {
        const data = await post("/api/models", { base_url: baseUrl.value.trim() });
        if (!data.ok) throw new Error(data.error || "Could not load models");
        renderModels(data.models || []);
      } catch (error) {
        addEntry("blocked", "Model List", String(error.message || error));
      } finally {
        setBusy(false);
      }
    }

    function renderModels(models) {
      modelList.textContent = "";
      const ids = models.map((item) => item.id).filter(Boolean);
      if (!ids.includes(model.value.trim())) ids.unshift(model.value.trim() || "local-model");
      for (const id of ids) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "model-item";
        button.dataset.model = id;
        button.textContent = id;
        button.addEventListener("click", () => selectModel(id));
        modelList.appendChild(button);
      }
      markActiveModel();
      addEntry("agent", "Models", ids.length ? `Loaded ${ids.length} model option(s).` : "No models returned.");
    }

    function selectModel(id) {
      model.value = id;
      markActiveModel();
    }

    function markActiveModel() {
      const current = model.value.trim();
      for (const item of modelList.querySelectorAll(".model-item")) {
        item.classList.toggle("active", item.dataset.model === current);
      }
    }

    function collectSettings() {
      const settings = {};
      for (const [key, field] of Object.entries(fields)) settings[key] = field.checked;
      return settings;
    }

    function applySettings(settings) {
      for (const [key, field] of Object.entries(fields)) field.checked = Boolean(settings[key]);
    }

    function renderMemory(memory) {
      const facts = memory.facts || {};
      const scans = memory.scan_history || [];
      memoryBox.textContent = [
        facts.os_name || "Unknown OS",
        facts.package_manager ? `packages: ${facts.package_manager}` : "packages: unknown",
        scans.length ? `scans: ${scans.length}` : "scans: 0"
      ].join("\n");
    }

    async function saveSettings() {
      setBusy(true, "Saving permissions");
      try {
        const data = await post("/api/settings", { settings: collectSettings() });
        if (!data.ok) throw new Error(data.error || "Save failed");
        applySettings(data.settings);
        renderMemory(data.memory || {});
        addEntry("agent", "Permissions Saved", "Updated local permission settings.");
      } catch (error) {
        addEntry("blocked", "Error", String(error.message || error));
      } finally {
        setBusy(false);
      }
    }

    async function sendMessage(text) {
      setBusy(true, "Thinking");
      addEntry("user", "User", text);
      try {
        const data = await post("/api/message", basePayload({ message: text }));
        handleResponse(data);
      } catch (error) {
        addEntry("blocked", "Error", String(error.message || error));
      } finally {
        setBusy(false);
      }
    }

    async function runScan() {
      setBusy(true, "Scanning system");
      try {
        const data = await post("/api/scan", basePayload());
        handleResponse(data);
        if (data.memory) renderMemory(data.memory);
      } catch (error) {
        addEntry("blocked", "Error", String(error.message || error));
      } finally {
        setBusy(false);
      }
    }

    async function runAction(action, confirmed = false) {
      setBusy(true, "Running action");
      try {
        const data = await post("/api/action", basePayload({ action, confirmed }));
        handleResponse(data);
      } catch (error) {
        addEntry("blocked", "Error", String(error.message || error));
      } finally {
        setBusy(false);
      }
    }

    function handleResponse(data) {
      if (!data.ok) {
        addEntry("blocked", "Error", data.error || "Request failed.");
        return;
      }
      sessionId = data.session_id || sessionId;
      for (const event of data.events || []) renderEvent(event);
    }

    function renderEvent(event) {
      if (event.type === "message") {
        addEntry("agent", "Agent", event.content);
      } else if (event.type === "scan_summary") {
        renderScanSummary(event.summary, event.results);
      } else if (event.type === "proposed_command") {
        const wrap = document.createElement("div");
        const reason = document.createElement("div");
        reason.textContent = event.reason || "Diagnostic command";
        wrap.appendChild(reason);
        wrap.appendChild(codeBlock(event.command));
        addEntry("warn", "Command", "", wrap);
      } else if (event.type === "command_result") {
        const wrap = document.createElement("div");
        wrap.appendChild(codeBlock(`exit code: ${event.exit_code}\n\nSTDOUT:\n${event.stdout || "(empty)"}\n\nSTDERR:\n${event.stderr || "(empty)"}`));
        addEntry(event.exit_code === 0 ? "agent" : "warn", "Command Result", event.command, wrap);
      } else if (event.type === "approval_required") {
        renderApproval(event.reason, event.command, approveCommand);
      } else if (event.type === "action_confirmation") {
        renderApproval(event.reason, event.command, (approved) => runAction(event.action, approved));
      } else if (event.type === "organize_plan") {
        renderOrganizePlan(event.plan);
      } else if (event.type === "organize_result") {
        const result = event.result || {};
        addEntry("agent", "Organization Result", `Moved ${result.applied?.length || 0} files. Skipped ${result.skipped?.length || 0}.`, codeBlock(JSON.stringify(result, null, 2)));
      } else if (event.type === "blocked") {
        addEntry("blocked", "Blocked", event.content);
      } else {
        addEntry("warn", "Notice", event.content || JSON.stringify(event));
      }
    }

    function renderScanSummary(summary, results) {
      const wrap = document.createElement("div");
      const top = document.createElement("div");
      top.textContent = `${summary.os_name || "Unknown OS"} | ${summary.package_manager || "no package manager"} | ${summary.kernel || "unknown kernel"}`;
      wrap.appendChild(top);
      const issues = document.createElement("div");
      issues.className = "issue-list";
      for (const issue of summary.issues || []) {
        const row = document.createElement("div");
        row.className = "issue";
        const title = document.createElement("strong");
        title.textContent = `${issue.severity}: ${issue.title}`;
        const detail = document.createElement("div");
        detail.textContent = issue.detail || "";
        const next = document.createElement("div");
        next.textContent = issue.next_step || "";
        row.append(title, detail, next);
        issues.appendChild(row);
      }
      if (!(summary.issues || []).length) {
        const row = document.createElement("div");
        row.className = "issue";
        row.textContent = "No obvious high-level issues detected by the deterministic scan.";
        issues.appendChild(row);
      }
      wrap.appendChild(issues);
      wrap.appendChild(codeBlock(JSON.stringify(results, null, 2)));
      addEntry("agent", "System Scan", "", wrap);
    }

    function renderOrganizePlan(plan) {
      const moves = plan.moves || [];
      const shown = moves.slice(0, 30);
      const body = `Planned moves: ${plan.move_count || 0}. Showing ${shown.length}.`;
      addEntry("agent", "Folder Plan", body, codeBlock(JSON.stringify(shown, null, 2)));
    }

    function renderApproval(reason, command, callback) {
      const wrap = document.createElement("div");
      const reasonEl = document.createElement("div");
      reasonEl.textContent = reason || "Approval required";
      wrap.appendChild(reasonEl);
      wrap.appendChild(codeBlock(command));
      const actions = document.createElement("div");
      actions.className = "approval-actions";
      const run = document.createElement("button");
      run.className = "danger";
      run.type = "button";
      run.textContent = "Run";
      const skip = document.createElement("button");
      skip.className = "secondary";
      skip.type = "button";
      skip.textContent = "Skip";
      actions.append(run, skip);
      wrap.appendChild(actions);
      addEntry("warn", "Confirmation", "", wrap);
      run.addEventListener("click", () => callback(true));
      skip.addEventListener("click", () => callback(false));
    }

    async function approveCommand(approved) {
      setBusy(true, approved ? "Running command" : "Skipping");
      try {
        const data = await post("/api/approve", { session_id: sessionId, approved });
        handleResponse(data);
      } catch (error) {
        addEntry("blocked", "Error", String(error.message || error));
      } finally {
        setBusy(false);
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      if (busy) return;
      const text = message.value.trim();
      if (!text) return;
      message.value = "";
      sendMessage(text);
    });

    model.addEventListener("input", markActiveModel);
    refreshModels.addEventListener("click", loadModels);
    darkMode.addEventListener("change", () => applyTheme(darkMode.checked ? "dark" : "light"));
    document.querySelector("#saveSettings").addEventListener("click", saveSettings);
    document.querySelector("#scan").addEventListener("click", runScan);
    document.querySelector("#checkUpdates").addEventListener("click", () => runAction("check_updates"));
    document.querySelector("#applyUpdates").addEventListener("click", () => runAction("apply_updates"));
    document.querySelector("#previewOrganize").addEventListener("click", () => runAction("organize_preview"));
    document.querySelector("#applyOrganize").addEventListener("click", () => runAction("organize_apply"));

    applyTheme(localStorage.getItem("lta-theme") || "dark");
    loadState().catch((error) => addEntry("blocked", "Error", String(error.message || error)));
    loadModels().catch((error) => addEntry("blocked", "Model List", String(error.message || error)));
  </script>
</body>
</html>
